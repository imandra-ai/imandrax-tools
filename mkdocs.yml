site_name: Codelogician / ImandraX Agent Harness
repo_url: https://github.com/imandra-ai/imandrax-tools
edit_uri: edit/main/docs/

docs_dir: docs
exclude_docs: |
  gen_skill_pages.py


theme:
  name: material
  logo: assets/logo.webp
  favicon: assets/logo.webp
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_skill_pages.py
  - literate-nav
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - packages/imandrax-api-models/src
            - packages/iml-query/src
            - packages/imandrax-tools/src
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - imandrax-api-models:
      - imandrax-api-models/index.md
      - API Reference: imandrax-api-models/reference.md
  - iml-query:
      - iml-query/index.md
      - API Reference: iml-query/reference.md
  - codelogician-skill:
      - codelogician-skill/index.md
      - Contents: codelogician-skill/contents/
  - imandrax-tools:
      - imandrax-tools/index.md
      - API Reference: imandrax-tools/reference.md
