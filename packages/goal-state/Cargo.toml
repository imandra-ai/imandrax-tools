[package]
name = "goal-state"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
python = ["pyo3/extension-module"]

[dependencies]
imandrax-api = { version = "0.1.0", path = "../../../imandrax-api/src/rust/lib" }
twine = { package = "twine-data", version = "*", path = "../../../imandrax-api/src/rust/lib/twine" }
bumpalo = "3.16.0"
anyhow = "1"
zip = "2"
num-bigint = "0.4"
num-rational = "0.4"
pyo3 = { version = "0.23", optional = true }

[dev-dependencies]
hegeltest = "0.3.4"
insta = "1.47.1"
