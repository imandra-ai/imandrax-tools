[project]
name = "imandrax-tools"
version = "19.0.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "hongyu", email = "hongyu@imandra.ai" }
]
requires-python = ">=3.12"
dependencies = [
    "imandrax-api-models>=19.3.1",
    "iml-query>=0.9.0",
    "pydantic>=2",
    "structlog>=24",
    "tree-sitter>=0.23",
]

[project.optional-dependencies]
extended-client = [
    "imandrax-api-models[client]>=19.3.1",
]
codegen = [
    "imandrax-codegen>=19.0.0",
]

[tool.uv.sources]
# imandrax-codegen = { path = "../imandrax-codegen", editable = true }
# imandrax-api-models = { path = "../imandrax-api-models", editable = true }
# iml-query = { path = "../iml-query", editable = true }

[dependency-groups]
dev = [
    "inline-snapshot>=0.32.6",
    "pytest>=9.0.1",
]

[build-system]
requires = ["maturin>=1.5,<2.0"]
build-backend = "maturin"

[tool.maturin]
python-source = "src"
module-name = "imandrax_tools.goal_state._goal_state"
include = [
    { path = "src/imandrax_tools/iml_eval_corpus/corpus/**/*", format = ["sdist", "wheel"] },
]
exclude = [
    { path = "src/imandrax_tools/iml_eval_corpus/corpus/**/__pycache__/**", format = ["sdist", "wheel"] },
]

# Development tools
# ====================

[tool.ruff.lint]
extend-select = [
    "Q",
    "RUF100",
    "RUF018", # https://docs.astral.sh/ruff/rules/assignment-in-assert/
    "C90",
    "UP",
    "I",
    "D",
    "TID251",
]
flake8-quotes = { inline-quotes = "single", multiline-quotes = "double" }
mccabe = { max-complexity = 15 }
ignore = [
    "D100", # ignore missing docstring in module
    "D101", # ignore missing docstring in public class
    "D102", # ignore missing docstring in public method
    "D103", # ignore missing docstring in public function
    "D104", # ignore missing docstring in public package
    "D105", # ignore missing docstring in magic methods
    "D106", # ignore missing docstring in public nested class
    "D107", # ignore missing docstring in __init__ methods
    "D203",
    "D212",
]
pycodestyle.ignore-overlong-task-comments = true
isort.combine-as-imports = true

[tool.ruff.lint.per-file-ignores]
"scripts/**/*.py" = ["F401", "RUF100", "D", "E402", "B018"]
"data/**/*.py" = ["F401", "RUF100", "D", "E402", "B018"]

[tool.ruff.format]
quote-style = "single"

[tool.ty]
environment.python = "./.venv"

[tool.ty.rules]
# Handled by pyright
unsupported-operator = "ignore"
invalid-argument-type = "ignore"
invalid-return-type = "ignore"
possibly-missing-attribute = "ignore"
unresolved-import = "ignore"
missing-argument = "ignore"

[tool.pyright]
venvPath = "."
venv = ".venv"
pythonVersion = "3.12"
typeCheckingMode = "strict"
reportMissingModuleSource = "none"
reportMissingTypeStubs = false
reportUnnecessaryIsInstance = false
reportUnnecessaryTypeIgnoreComment = true
reportUnusedImport = "none"
reportUnusedExpression = false

[tool.inline-snapshot]
format-command="uvx ruff check --fix-only --stdin-filename {filename} | uvx ruff format --stdin-filename {filename}"
