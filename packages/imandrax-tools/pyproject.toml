[project]
name = "imandrax-tools"
version = "20.2.1"
description = "Umbralla package bundling imandrax-api-models and iml-query. Also provides miscellaneous utilities (goal state formatting, rec knowledge base)."
readme = "README.md"
authors = [
    { name = "hongyu", email = "hongyu@imandra.ai" }
]
requires-python = ">=3.12"
dependencies = [
    "imandrax-api-models>=20.0.0, <21.0.0",
    "iml-query>=0.11.0",
    "pydantic>=2",
    "structlog>=24",
    "tree-sitter>=0.23",
]

[project.optional-dependencies]
extended-client = [
    "imandrax-api-models[client]>=20.0.0, <21.0.0",
]
codegen = [
    "imandrax-codegen>=20.0.0, <21.0.0",
]
widget = [
    "anywidget>=0.11.0",
]

[tool.uv.sources]
imandrax-codegen = { path = "../imandrax-codegen", editable = true }
imandrax-api-models = { workspace = true }
iml-query = { workspace = true }

[dependency-groups]
dev = [
    "inline-snapshot>=0.32.6",
    "pytest>=9.0.1",
    "pydantic-to-typescript>=2.0.0",
    "pytest-recording>=0.13.4",
    "pytest-asyncio>=1.4.0",
]

[build-system]
requires = ["uv_build>=0.8.22,<0.9.0"]
build-backend = "uv_build"

# Development tools
# ====================

# handle by workspace root config
# [tool.pyright]
# venvPath = "."
# venv = ".venv"
# pythonVersion = "3.12"
# typeCheckingMode = "strict"
# reportMissingModuleSource = "none"
# reportMissingTypeStubs = false
# reportUnnecessaryIsInstance = false
# reportUnnecessaryTypeIgnoreComment = true
# reportUnusedImport = "none"
# reportUnusedExpression = false

[tool.inline-snapshot]
format-command="uvx ruff check --fix-only --stdin-filename {filename} | uvx ruff format --stdin-filename {filename}"
