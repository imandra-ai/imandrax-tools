name: nested_conditions
iml: |
  let nested_check = fun x y ->
    if x > 0 then
      if y > 0 then x + y
      else x - y
    else
      if y > 0 then y - x
      else -(x + y)
decomp_kwargs:
  name: nested_check
  prune: true
  string_results: true
regions:
- model_str:
    x: '0'
    y: '0'
  model_eval_str: '0'
  invariant_str: (-1) * x + (-1) * y
  constraints_str:
  - y <= 0
  - x <= 0
- model_str:
    x: '0'
    y: '1'
  model_eval_str: '1'
  invariant_str: y + (-1) * x
  constraints_str:
  - y >= 1
  - x <= 0
- model_str:
    x: '1'
    y: '0'
  model_eval_str: '1'
  invariant_str: x + (-1) * y
  constraints_str:
  - y <= 0
  - x >= 1
- model_str:
    x: '1'
    y: '1'
  model_eval_str: '2'
  invariant_str: x + y
  constraints_str:
  - y >= 1
  - x >= 1
decomp_res:
  artifact:
    kind: mir.fun_decomp
    data: 
    api_version: v20
    storage: []
  task:
    id:
      id: task:decomp:DjZRM9Z6DefR7FW9KQUmtR5akxTv6IUuEV4cttxm070=
    kind: TASK_DECOMP
  errors: []
