name: complex_variant_record
iml: |
  type status = Active | Inactive

  type user = {
    id: int;
    active: status;
  }

  let process_user = fun u ->
    match u.active with
    | Active -> if u.id > 0 then u.id else 0
    | Inactive -> -1
decomp_kwargs:
  name: process_user
  prune: true
  string_results: true
regions:
- model_str:
    u: '{id = 0; active = Inactive}'
  model_eval_str: (-1)
  invariant_str: (-1)
  constraints_str:
  - u.active <> Active
- model_str:
    u: '{id = 0; active = Active}'
  model_eval_str: '0'
  invariant_str: '0'
  constraints_str:
  - u.active = Active
  - u.id <= 0
- model_str:
    u: '{id = 1; active = Active}'
  model_eval_str: '1'
  invariant_str: u.id
  constraints_str:
  - u.active = Active
  - u.id >= 1
decomp_res:
  artifact:
    kind: mir.fun_decomp
    data: 
    api_version: v20
    storage: []
  task:
    id:
      id: task:decomp:-wGCqTLXGR8sLKZJBw2Tib__gV0YGme8pNWtx8sSOxo=
    kind: TASK_DECOMP
  errors: []
