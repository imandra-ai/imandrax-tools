name: composite_tuple
iml: |
  let tuple_compare = fun (a, b) ->
    if a > b then a - b
    else if a = b then 0
    else b - a
decomp_kwargs:
  name: tuple_compare
  prune: true
  string_results: true
regions:
- model_str:
    _x_1_25: (0, 1)
  model_eval_str: '1'
  invariant_str: _x_1_25.1 + (-1) * _x_1_25.0
  constraints_str:
  - _x_1_25.0 <> _x_1_25.1
  - _x_1_25.0 <= _x_1_25.1
- model_str:
    _x_1_25: (0, 0)
  model_eval_str: '0'
  invariant_str: '0'
  constraints_str:
  - _x_1_25.0 = _x_1_25.1
