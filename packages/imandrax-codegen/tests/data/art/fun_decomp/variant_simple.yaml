name: variant_simple
iml: |
  type color = Red | Green | Blue

  let color_value = fun c ->
    match c with
    | Red -> 1
    | Green -> 2
    | Blue -> 3
decomp_kwargs:
  name: color_value
  prune: true
  string_results: true
regions:
- model_str:
    c: Red
  model_eval_str: '1'
  invariant_str: '1'
  constraints_str:
  - c <> Blue
  - c <> Green
- model_str:
    c: Green
  model_eval_str: '2'
  invariant_str: '2'
  constraints_str:
  - c = Green
  - c <> Blue
- model_str:
    c: Blue
  model_eval_str: '3'
  invariant_str: '3'
  constraints_str:
  - c = Blue
decomp_res:
  artifact:
    kind: mir.fun_decomp
    data: 
    api_version: v20
    storage: []
  task:
    id:
      id: task:decomp:ytV4NmAk1ts7luT_7Iw4hBTCu8ZzCGRn2SWO9f2GB7w=
    kind: TASK_DECOMP
  errors: []
