name: infeasible_region_in_trivial_forall
iml: |
  let always_true (x : int) : bool = true

  let check (xs : int list) : int list option =
    if List.for_all always_true xs then Some xs else None
decomp_kwargs:
  name: check
  prune: true
regions:
- model_str: {}
  model_eval_str: 'assert false (* pruning the region failed: { reason = "max number
    of steps (100) reached" } *)'
  invariant_str: None
  constraints_str:
  - not (List.for_all always_true xs)
- model_str:
    xs: '[]'
  model_eval_str: Some []
  invariant_str: Some xs
  constraints_str:
  - List.for_all always_true xs
