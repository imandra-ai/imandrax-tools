    "use":
      "notations": [{"name": "use", "patterns": ["[%use foo x y z]"], "description": "Note the notation [[%use foo x y z]] handles term quoting automatically.", "description_md": "Note the notation `[%use foo x y z]` handles term quoting automatically."}]
