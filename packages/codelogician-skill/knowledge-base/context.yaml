all_module_signatures:
  content: >
    <prelude> Prelude (readily available, no need to quantify with module name)


      val || : bool -> bool -> bool
      val && : bool -> bool -> bool
      val = : 'a -> 'a -> bool
      val <> : 'a -> 'a -> bool
      val not : bool -> bool
      val ==> : bool -> bool -> bool
      val <== : bool -> bool -> bool
      val <==> : bool -> bool -> bool
      val + : int -> int -> int
      val const : 'a -> 'b -> 'a
      val >= : int -> int -> bool
      val mk_nat : int -> int
      val < : int -> int -> bool
      val <= : int -> int -> bool
      val > : int -> int -> bool
      val min : int -> int -> int
      val max : int -> int -> int
      val <. : real -> real -> bool
      val <=. : real -> real -> bool
      val >. : real -> real -> bool
      val >=. : real -> real -> bool
      val min_r : real -> real -> real
      val max_r : real -> real -> real
      val ~- : int -> int
      val abs : int -> int
      val - : int -> int -> int
      val ~+ : int -> int
      val * : int -> int -> int
      val / : int -> int -> int
      val mod : int -> int -> int
      val compare : int -> int -> int  (*  Total order, if x = y then 0 else if x < y then -1 else 1  *)

    type list =


      | []
      | ( :: ) of 'a * 'a list

    type result =


      | Ok of 'a
      | Error of 'b
    (*  Result type, representing either a successul result [Ok x] or an error


        [Error x].  *)
    </prelude>

