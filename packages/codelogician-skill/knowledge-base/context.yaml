short_iml_101:
  content: >
    IML (Imandra Modeling Language) - syntax: a formalized Higher-Order subset of OCaml extended with theorem proving tactics and verification annotations - features: counter-example generation, automated induction, conditional rewriting, bounded and unbounded verification, theorem proving, model checking, lemma discovery - logic: Computational Higher-Order Logic (HOL) based on a pure subset of OCaml. Recursion and Induction based on ordinals up to ε_0. - tags: #reasoner #automated reasoning engine #interactive theorem prover #automated theorem prover #functional programming lang uage #formal verification

iml_caveats:
  content:
    - >
      Prefer pattern matching over using auxiliary functions if possible because it makes recursive steps explicit and visible, and directly reflects data's inductive structure. In comparison, auxiliary functions like `List.nth`, `List.length` add a layer of a bstraction that obscures the underlying recursive structure, making formal verification more complex.

    - >
      Nested recursive functions complicate the proof process. Try to extract the nested function into a top-level function if possi ble.

    - >
      Higher-order function: When passing lambdas (anonymous functions) to higher-order functions like `List.filter`, `List.map`, `L ist.fold_left`, etc., annotating the lambda parameters with their concrete types will help Imandra use reduce higher-order defin itions to first-order form for easier reasoning.

    - >
      Record types' field name: Don't define record types with the same field names in the same name space (module) unless you are w illing to disambiguate them with annotations.

quickstart_examples:
  content:
    overview: >
      Each example demonstrates key concepts in IML through: 1. Explanatory comments before functions that highlight important concepts 2. REPL evaluation results showing type signatures and values. Comments marked with (* val ... *) show the REPL's response, helping you understand type inference and evaluation. These comments are only for educational purposes. They teach you about the thinking process of writing IML code but they might not desired to exist when writing IML code.

    examples:
      - >
        (* Float-like literal is interpreted as type `real`, arbitary precision real number. *) let pi = 3.14159 (* val pi : real = 314159/100000 *) (* Arithemetic for real: - multiplication `*.` - division `/.` - etc *) let circle_area (d : real) : real = let r = d /. 2.0 in pi *. r *. r (* val circle_area : real -> real = <fun> *)

      - >
        (* Note: `int` is the type for integers. *) let count_negatives_in_row (row : int list) : int =


            List.fold_left (fun acc num -> if num < 0 then acc + 1 else acc) 0 row
          (* val count_negatives_in_row : int list -> int = <fun> *)
          let x = count_negatives_in_row [-1; -2; -3; 4; 5]
          (* val x : int = 3 *)
          (* Note:
            - `List.nth: int -> 'a list -> 'a option`, NOT returning 'a as in OCaml
            - That's why we need binding operator `let+` and `let*` from `Option` module
          *)
          let count_negative_numbers_in_a_column_wise_row_wise_sorted_matrix
              (m : int list list)
              (n : int)
              (cols : int)
              : int option =
            List.fold_left
              (fun acc i ->
                (* import Option module locally to use `let*`. could also be imported at thebeginning by `open Option` *)
                let open Option in
                let* acc_val = acc in
                let+ row_count = map count_negatives_in_row (List.nth i m) in
                acc_val + row_count)
              (Some 0)
              (0 -- (n - 1))
          (* val count_negative_numbers_in_a_column_wise_row_wise_sorted_matrix :
            int list list -> int -> int -> int option = <fun> *)
      - >
        (* Note: - integer division and modulo in IML: `mod: int -> int -> int`. And `/`. *) let is_divisor (n : int) (divisor : int) : bool =


            n mod divisor = 0
          (* val is_divisor : int -> int -> bool = <fun> *)
          let add_divisors (n : int) (divisor : int) (current_sum : int) : int =
            if divisor = n / divisor then
              current_sum + divisor
            else
              current_sum + divisor + n / divisor
          (* val add_divisors : int -> int -> int -> int = <fun> *)
          let sqrt : real -> real = () [@@opaque]
          (* val sqrt : real -> real = <fun> *)
          (* Note:
          - conversion between `int` and `real`: `Real.of_int` and `Real.to_int`.
          *)
          let sum_of_all_proper_divisors_of_a_natural_number (num : int) : int =
            let calculate_sum_of_divisors (n : int) (limit : int) : int =
              List.fold_left
                (fun acc i ->
                  if is_divisor n i then
                    acc + add_divisors n i 0
                  else
                    acc)
                0
                (2 -- limit)
            in
            let limit = Real.to_int (Real.of_int num |> sqrt) in
            calculate_sum_of_divisors num limit + 1
          (* val sum_of_all_proper_divisors_of_a_natural_number : int -> int = <fun> *)
      - >
        (* Another example with conversion between `real` and `int`. *) let sum_of_first_n_numbers (n: int) : real =


          (Real.of_int n *. (Real.of_int n +. 1.0)) /. 2.0
        (* val sum_of_first_n_numbers : int -> real = <fun> *) let sum_of_squares_of_first_n_numbers (n: int) : real =


          (Real.of_int n *. (Real.of_int n +. 1.0) *. (2.0 *. Real.of_int n +. 1.0)) /. 6.0
        (* val sum_of_squares_of_first_n_numbers : int -> real = <fun> *) let sum_matrix_element_absolute_difference_row_column_numbers_2 (n: int) : int =


          let sum_first_n = sum_of_first_n_numbers n in
          let sum_squares_n = sum_of_squares_of_first_n_numbers n in
          (sum_first_n +. sum_squares_n) |> Real.to_int
        (* val sum_matrix_element_absolute_difference_row_column_numbers_2 : int -> int = <fun> *)

      - >
        (* Note: - for opeartions that is unavailable in IML, `[@@opaque]` can be attached


          to a dummy implementation with correct type signature. Such implementation
          can be used to bypass unavailable functions during compilation.
        - Example of unavailable operations: bitwise operations (e.g., `land`, `lxor`),


          irrational arithmetic (e.g., square root, exponentiation), random.
        *) let xor : int -> int -> int = () [@@opaque] (* val xor : int -> int -> int = <fun> *) let rec helper state pairs =


          match pairs with
          | [] -> state
          | (a, b) :: rest ->
            let new_state = min state (xor a b) in
            helper new_state rest
        (* val helper : int -> (int * int) list -> int = <fun> *) let find_minimum_xor (arr : int list) : int =


          let initial_state = 999999 in
          let pairs = List.monoid_product arr arr |> List.filter (fun (a, b) -> a < b) in
          helper initial_state pairs
        (* val find_minimum_xor : int list -> int = <fun> *) let minimum_xor_value_pair (arr : int list) : int =


          let sorted_arr = List.sort ~leq:(fun a b -> a <= b) arr in
          find_minimum_xor sorted_arr
        (* val minimum_xor_value_pair : int list -> int = <fun> *)

      - >
        (* Another example using `[@@opaque]` *) open Option let random_int : int -> int = () [@@opaque] (* val random_int : int -> int = <fun> *) let swap_elements lst i j =


          let get_i = List.nth i lst in
          let get_j = List.nth j lst in
          List.mapi (fun idx x ->
            if idx = i then
              get_j |> get_or ~default:x
            else if idx = j then
              get_i |> get_or ~default:x
            else
              x
          ) lst
        (* val swap_elements : 'a list -> int -> int -> 'a list = <fun> *) let shuffle_a_given_array (arr : int list) : int list =


          let rec helper state i =
            if i <= 0 then
              state
            else
              let j = random_int (i + 1) in
              let state = swap_elements state i j in
              helper state (i - 1)
          in
          helper arr (List.length arr - 1)
        (* val shuffle_a_given_array : int list -> int list = <fun> *)

      - >
        (* Character and String: - IML supports logic-mode character `LChar.t` and logic-mode string `LString.t`. - `{l|...|l}` is used to create a logic-mode string, `LString.t`, aka, `LChar.t list`. - To create a logic-mode character, `LChar.t`, you can use list operations on `LString.t`, eg `List.hd {l|...|l}`. *) let char_0: LChar.t = List.hd {l|0|l} let char_1: LChar.t = List.hd {l|1|l} (* val char_0 : LChar.t = '0' val char_1 : LChar.t = '1' *) let count_bits (s : LString.t) : int * int =


          let zeros = List.fold_left (fun acc ch -> if ch = char_0 then acc + 1 else acc) 0 s in
          let ones = List.length s - zeros in
          (zeros, ones)
        (* val count_bits : LString.t -> int * int = <fun> *) let change_bits_can_made_one_flip (s : LString.t) : bool =


          let zeros, ones = count_bits s in
          zeros = 1 || ones = 1
        (* val change_bits_can_made_one_flip : LString.t -> bool = <fun> *)

tactics:
  "tactics": [{"name": "quote_term", "tac_id": "fn.tac.quote_term", "signature": "'a -> 'a term", "documentation": "[quote_term (1 + 2)] is a quotation that will not evaluate to anything but\nthe term \"1 + 2\". It can then be provided as-is to a tactic.", "documentation_md": "`quote_term (1 + 2)` is a quotation that will not evaluate to anything but\nthe term \"1 + 2\". It can then be provided as-is to a tactic."}, {"name": "combine_proofs", "tac_id": "fn.tac.combine_proofs", "signature": "proof list -> proof -> proof", "documentation": "Given a proof [p] of [box A1, …, box An |- box B] and [hyps], proofs of\n[|- box A_i] respectively, return a proof of [|- box B]", "documentation_md": "Given a proof `p` of `box A1, ..., box An |- box B` and `hyps`, proofs of\n`|- box A_i` respectively, return a proof of `|- box B`"}, {"name": "skip", "tac_id": "fn.tac.skip", "signature": "t", "documentation": "[skip] is a no-op from a reasoning perspective (goal will be unchanged).\nThis can be useful when needing to put a place-holder tactic in, e.g., a\nlist of tactics for subgoals when using [@>|], e.g.,\n[... @|> [...; skip; ...]].\n\nSee the variant [skip_msg] which is like [skip] but also prints a message.\n\nNote the notation [[%skip \"skip message\"]] can be used, with [[%skip]]\nemitting no message.", "documentation_md": "`skip` is a no-op from a reasoning perspective (goal will be unchanged).\nThis can be useful when needing to put a place-holder tactic in, e.g., a\nlist of tactics for subgoals when using `@>|`, e.g.,\n`... @|> [...; skip; ...]`.\n\nSee the variant `skip_msg` which is like `skip` but also prints a message.\n\nNote the notation `[%skip \"skip message\"]` can be used, with `[%skip]`\nemitting no message."}, {"name": "skip_msg", "tac_id": "fn.tac.skip_msg", "signature": "string -> t", "documentation": "[skip_msg \"msg\"] is like [skip] (a reasoning no-op) but also prints the\nstring \"msg\". This can be useful for tactic debugging.\n\nNote the notation [[%skip \"skip message\"]] can be used, with [[%skip]]\nemitting no message.", "documentation_md": "`skip_msg \"msg\"` is like `skip` (a reasoning no-op) but also prints the\nstring \"msg\". This can be useful for tactic debugging.\n\nNote the notation `[%skip \"skip message\"]` can be used, with `[%skip]`\nemitting no message."}, {"name": "ground_eval", "tac_id": "fn.tac.eval", "signature": "?max_cache:int -> unit -> t", "documentation": "", "documentation_md": ""}, {"name": "qs", "tac_id": "fn.tac.qs", "signature": "t", "documentation": "A very fast, incomplete SMT solver for simple QF_UFDT/LIA/LRA goals.", "documentation_md": "A very fast, incomplete SMT solver for simple QF_UFDT/LIA/LRA goals."}, {"name": "cc", "tac_id": "fn.tac.cc", "signature": "t", "documentation": "", "documentation_md": ""}, {"name": "simp", "tac_id": "fn.tac.simp", "signature": "t", "documentation": "Quick and simple simplifier. This always returns 1 goal.", "documentation_md": "Quick and simple simplifier. This always returns 1 goal."}, {"name": "simp_all", "tac_id": "fn.tac.simp_all", "signature": "t", "documentation": "Quick and simple simplifier on hypotheses and conclusion. This always\nreturns 1 goal.", "documentation_md": "Quick and simple simplifier on hypotheses and conclusion. This always\nreturns 1 goal."}, {"name": "ctx_simplify", "tac_id": "fn.tac.ctx_simplify", "signature": "t", "documentation": "Contextual simplifcation", "documentation_md": "Contextual simplifcation"}, {"name": "expr_simplify", "tac_id": "fn.tac.expr_simplify", "signature": "t", "documentation": "Moral equivalent of Z3's Expr.simplify applied to each hypothesis and\nconclusion in the goal.", "documentation_md": "Moral equivalent of Z3's Expr.simplify applied to each hypothesis and\nconclusion in the goal."}, {"name": "or_left", "tac_id": "fn.tac.or_left", "signature": "t", "documentation": "Takes [G ?- a || b], returns [G ?- a]", "documentation_md": "Takes `G ?- a || b`, returns `G ?- a`"}, {"name": "or_right", "tac_id": "fn.tac.or_right", "signature": "t", "documentation": "Takes [G ?- a || b], returns [G ?- b]", "documentation_md": "Takes `G ?- a || b`, returns `G ?- b`"}, {"name": "split_and", "tac_id": "fn.tac.split_and", "signature": "t", "documentation": "Takes [G ?- a && b], returns [G ?- a] and [G ?- b]", "documentation_md": "Takes `G ?- a && b`, returns `G ?- a` and `G ?- b`"}, {"name": "exact", "tac_id": "fn.tac.exact", "signature": "t", "documentation": "Takes [G, t ?- t, …], succeeds with no further goal. Otherwise fails.", "documentation_md": "Takes `G, t ?- t, ...`, succeeds with no further goal. Otherwise fails."}, {"name": "trivial", "tac_id": "fn.tac.trivial", "signature": "t", "documentation": "Succeeds if a goal is trivially true due to having [false] in the\nhypotheses, [true] in the conclusion, or the exact same term in the\nhypotheses and conclusion (subsuming the [exact] tactic).", "documentation_md": "Succeeds if a goal is trivially true due to having `false` in the\nhypotheses, `true` in the conclusion, or the exact same term in the\nhypotheses and conclusion (subsuming the `exact` tactic)."}, {"name": "intros", "tac_id": "fn.tac.intros", "signature": "t", "documentation": "[intros] takes a goal [H |- (A && B) ==> C] and returns the new goal\n[H, A, B |- C].", "documentation_md": "`intros` takes a goal `H |- (A && B) ==> C` and returns the new goal\n`H, A, B |- C`."}, {"name": "unintros", "tac_id": "fn.tac.unintros", "signature": "int list -> t", "documentation": "[unintros [1;3;4]] takes a goal [H0; H1; …; H7 |- C] and turns it into\n[H0; H2; H5; H6; H7 |- (H1 && H3 && H4) ==> C]. In that sense it's the\ninverse of [intros].", "documentation_md": "`unintros [1;3;4]` takes a goal `H0; H1; ...; H7 |- C` and turns it into\n`H0; H2; H5; H6; H7 |- (H1 && H3 && H4) ==> C`. In that sense it's the\ninverse of `intros`."}, {"name": "swap", "tac_id": "fn.tac.swap", "signature": "int -> t", "documentation": "[swap i] takes a goal [H0; ...; Hk |- C0; ...; Ck] and `swaps` a literal\n(either a hypothesis or a conclusion term) over the sequent line (|-),\nnegating it in the process.\n\nIf [i>=0], then hypothesis [i] ([Hi]) is negated and made a conclusion. If\n[i<0], then conclusion [abs(i+1)] (C(abs(i+1))) is negated and made a\nhypothesis.", "documentation_md": "`swap i` takes a goal `H0; ...; Hk |- C0; ...; Ck` and `swaps` a literal\n(either a hypothesis or a conclusion term) over the sequent line (|-),\nnegating it in the process.\n\nIf `i>=0`, then hypothesis `i` (`Hi`) is negated and made a conclusion. If\n`i<0`, then conclusion `abs(i+1)` (C(abs(i+1))) is negated and made a\nhypothesis."}, {"name": "drop", "tac_id": "fn.tac.drop", "signature": "int -> t", "documentation": "[drop i] drops a hypothesis or conclusion, using the same literal\naddressing scheme as `swap`.", "documentation_md": "`drop i` drops a hypothesis or conclusion, using the same literal\naddressing scheme as `swap`."}, {"name": "expand", "tac_id": "fn.tac.expand", "signature": "?index:int -> ?all:bool -> string -> t", "documentation": "[expand \"foo\"] expands the first occurrence of `foo`.\n[expand ~index:3 \"foo\"] expands the index 3 (i.e., fourth) occurrence of\n`foo`. [expand ~all:true \"foo\"] expands all current instances of `foo`.\nInstances introduced through this expansion process will not be\nrecursively expanded.\n\nNote the notation [[%expand \"foo\"]] can also be used, with either function\nnames or terms which will be automatically quoted (see `expand_term`).", "documentation_md": "`expand \"foo\"` expands the first occurrence of `foo`.\n`expand ~index:3 \"foo\"` expands the index 3 (i.e., fourth) occurrence of\n`foo`. `expand ~all:true \"foo\"` expands all current instances of `foo`.\nInstances introduced through this expansion process will not be\nrecursively expanded.\n\nNote the notation `[%expand \"foo\"]` can also be used, with either function\nnames or terms which will be automatically quoted (see `expand_term`)."}, {"name": "expand_term", "tac_id": "fn.tac.expand_term", "signature": "?index:int -> ?all:bool -> 'a term -> t", "documentation": "[expand_term (quote_term (foo x))] expands the first occurrence of `foo\nx`. [expand_term ~index:3 (quote_term (foo x))] expands the index 3 (i.e.,\nfourth) occurrence of `foo x`.\n[expand_term ~all:true (quote_term (foo x))] expands all current instances\nof `foo`. Instances introduced through this expansion process will not be\nrecursively expanded.\n\nNote the notation [[%expand (foo x)]] handles term quoting automatically.", "documentation_md": "`expand_term (quote_term (foo x))` expands the first occurrence of `foo\nx`. `expand_term ~index:3 (quote_term (foo x))` expands the index 3 (i.e.,\nfourth) occurrence of `foo x`.\n`expand_term ~all:true (quote_term (foo x))` expands all current instances\nof `foo`. Instances introduced through this expansion process will not be\nrecursively expanded.\n\nNote the notation `[%expand (foo x)]` handles term quoting automatically."}, {"name": "replace", "tac_id": "fn.tac.replace", "signature": "'a term -> t", "documentation": "[replace (quote_term x)] uses an equality hypothesis `x=t` to replace `x`\nby `t`.", "documentation_md": "`replace (quote_term x)` uses an equality hypothesis `x=t` to replace `x`\nby `t`."}, {"name": "normalize", "tac_id": "fn.tac.normalize", "signature": "?rules:identifier list -> ?strict:bool -> ?basis:identifier list -> ?inline:bool -> 'a term -> t", "documentation": "[normalize (quote_term t)] normalizes a given term under hypotheses of the\ncurrent goal, replacing the term with its normalized version if it appears\nin the goal, and adding the hypotheses `t = normalized_t` if the target\nterm does not appear already in the goal.\n\nNormalization applies all active rewrite rules, forward chaining rules,\nexpands all enabled non-recursive function definitions and includes the\nspeculative expansion and simplification of recursive functions in order\nto take advantage of inductive hypotheses, in the same manner as the\nwaterfall simplifier.\n\nThe `rules` and `strict` parameters behave the same as with the `simplify`\ntactic, restricting which rewrite rules and function definitions may be\napplied and/or expanded. The `basis` parameter acts as a restriction on\nwhich function definitions can be expanded (basis members are not\nexpanded, unless they are explicitly given via `rules` with `strict:true`.\n\nNote the notation [[%normalize t]] which normalizes term `t` with default\narguments given to [normalize].", "documentation_md": "`normalize (quote_term t)` normalizes a given term under hypotheses of the\ncurrent goal, replacing the term with its normalized version if it appears\nin the goal, and adding the hypotheses `t = normalized_t` if the target\nterm does not appear already in the goal.\n\nNormalization applies all active rewrite rules, forward chaining rules,\nexpands all enabled non-recursive function definitions and includes the\nspeculative expansion and simplification of recursive functions in order\nto take advantage of inductive hypotheses, in the same manner as the\nwaterfall simplifier.\n\nThe `rules` and `strict` parameters behave the same as with the `simplify`\ntactic, restricting which rewrite rules and function definitions may be\napplied and/or expanded. The `basis` parameter acts as a restriction on\nwhich function definitions can be expanded (basis members are not\nexpanded, unless they are explicitly given via `rules` with `strict:true`.\n\nNote the notation `[%normalize t]` which normalizes term `t` with default\narguments given to `normalize`."}, {"name": "generalize", "tac_id": "fn.tac.generalize", "signature": "'a term -> string -> t", "documentation": "[generalize (quote_term t) gen_name] generalizes term `t` by replacing it\nwith a fresh Skolem of the appropriate type throughout the goal. There are\nsome restrictions on the name `gen_name` used for the new general term: no\nterms can already appear in the goal with the same name, and the term\nshould follow the basic syntactic rules of IML/OCaml identifiers (begin\nwith a lowercase alphabetical character or `_`, etc.).", "documentation_md": "`generalize (quote_term t) gen_name` generalizes term `t` by replacing it\nwith a fresh Skolem of the appropriate type throughout the goal. There are\nsome restrictions on the name `gen_name` used for the new general term: no\nterms can already appear in the goal with the same name, and the term\nshould follow the basic syntactic rules of IML/OCaml identifiers (begin\nwith a lowercase alphabetical character or `_`, etc.)."}, {"name": "cases", "tac_id": "fn.tac.cases", "signature": "bool term list -> t", "documentation": "[cases [(quote_term t1);...;(quote_term tk)]] case-splits on the given\ncases, returning k+1 subgoals consisting of one for each case (with the\ncase added as a hypothesis), and one additional subgoal for the 'negative'\ncase in which all t1,...,tk are false. The terms must be boolean-valued.\n\nNote the notation [[%cases t1, t2, ..., tk]] will handle term quoting\nautomatically.", "documentation_md": "`cases [(quote_term t1);...;(quote_term tk)]` case-splits on the given\ncases, returning k+1 subgoals consisting of one for each case (with the\ncase added as a hypothesis), and one additional subgoal for the 'negative'\ncase in which all t1,...,tk are false. The terms must be boolean-valued.\n\nNote the notation `[%cases t1, t2, ..., tk]` will handle term quoting\nautomatically."}, {"name": "subgoal", "tac_id": "fn.tac.subgoal", "signature": "bool term -> t", "documentation": "[subgoal (quote_term t)] assumes a term and adds the correctness of this\nassumption as a subgoal. This effectively applies the `cut` rule of\nsequent calculus to produce two subgoals: one in which the term has been\nassumed, and another in which the term must be proved under the current\ngoal context. The term must be boolean-valued.\n\nNote the notation [[%subgoal t]] will handle term quoting automatically.", "documentation_md": "`subgoal (quote_term t)` assumes a term and adds the correctness of this\nassumption as a subgoal. This effectively applies the `cut` rule of\nsequent calculus to produce two subgoals: one in which the term has been\nassumed, and another in which the term must be proved under the current\ngoal context. The term must be boolean-valued.\n\nNote the notation `[%subgoal t]` will handle term quoting automatically."}, {"name": "lift_ifs", "tac_id": "fn.tac.lift_ifs", "signature": "t", "documentation": "Lift if-then-else expressions to the top-level and split accordingly into\nsubgoals. This does a limited amount of feasibility checking to eliminate\nobviously true subgoals (infeasible `if` branches under the current\ncontext) while lifting.", "documentation_md": "Lift if-then-else expressions to the top-level and split accordingly into\nsubgoals. This does a limited amount of feasibility checking to eliminate\nobviously true subgoals (infeasible `if` branches under the current\ncontext) while lifting."}, {"name": "flatten", "tac_id": "fn.tac.flatten", "signature": "t", "documentation": "Disjunctive flattening.", "documentation_md": "Disjunctive flattening."}, {"name": "smolsmt", "tac_id": "fn.tac.smolsmt", "signature": "t", "documentation": "A small and simple SMT solver for QF_UF goals.", "documentation_md": "A small and simple SMT solver for QF_UF goals."}, {"name": "unroll", "tac_id": "fn.tac.unroll", "signature": "?smt:string -> ?query_timeout:int -> ?no_asm_query_timeout:int -> int -> t", "documentation": "[unroll ~smt:\"z3\" 42] does 42 rounds of unrolling with SMT solver named\n\"z3\". Pass [?smt:None] to use the best available SMT solver.", "documentation_md": "`unroll ~smt:\"z3\" 42` does 42 rounds of unrolling with SMT solver named\n\"z3\". Pass `?smt:None` to use the best available SMT solver."}, {"name": "arith", "tac_id": "fn.tac.arith", "signature": "t", "documentation": "A decision procedure for linear (real and integer) arithmetic.", "documentation_md": "A decision procedure for linear (real and integer) arithmetic."}, {"name": "nonlin", "tac_id": "fn.tac.nonlin", "signature": "?smt:string -> unit -> t", "documentation": "An SMT solver with non-linear arithmetic enabled. Pass [None] to use the\nbest available SMT solver.", "documentation_md": "An SMT solver with non-linear arithmetic enabled. Pass `None` to use the\nbest available SMT solver."}, {"name": "auto", "tac_id": "fn.tac.auto", "signature": "t", "documentation": "Auto tactic, Imandra's flagship automated inductive waterfall proof\nprocedure, taking into account all known active (rw,fc,elim,gen) rules,\nincorporating conditional rewriting with back-chaining, speculative\nexpansion of recursive functions and symbolic execution, forward-chaining\nfor simplification contexts, subgoaling, congruence closure, tautology\ndetection, destructor elimination, generalization and automated induction.", "documentation_md": "Auto tactic, Imandra's flagship automated inductive waterfall proof\nprocedure, taking into account all known active (rw,fc,elim,gen) rules,\nincorporating conditional rewriting with back-chaining, speculative\nexpansion of recursive functions and symbolic execution, forward-chaining\nfor simplification contexts, subgoaling, congruence closure, tautology\ndetection, destructor elimination, generalization and automated induction."}, {"name": "induction", "tac_id": "fn.tac.induction", "signature": "?id:identifier -> ?vars:string list -> unit -> t", "documentation": "Induction tactic: Synthesize an induction scheme for the goal and apply\nit. This does not invoke the induction waterfall (as in `auto`).", "documentation_md": "Induction tactic: Synthesize an induction scheme for the goal and apply\nit. This does not invoke the induction waterfall (as in `auto`)."}, {"name": "simplify", "tac_id": "fn.tac.simplify", "signature": "?smt:string -> ?backchain_limit:int -> ?rules:identifier list -> ?strict:bool -> ?basis:identifier list -> unit -> t", "documentation": "Full simplifier (the waterfall simplifier). Pass [?smt:None] to use the\nbest available SMT solver. The parameter `rules` is an optional list of\nIDs of rewrite rules. If given, only these rewrite rules will be used\nduring simplification. The parameter `~strict` when `true` and given in\nconjunction with `rules` further restricts the simplifier to only use\ndefinitional rules (function definitions, both recursive and\nnon-recursive) and rewrite rules which are explicitly present in the\n`rules` list. The parameter `~backchain_limit` controls the recursive\ndepth of back-chaining on hypotheses that is allowed during the relieving\nof rewrite rule guards (hypotheses).\n\nNote the syntax `[%simplify foo, bar, baz]` which expands to `simplify\n~rules:[[%id foo]; [%id bar]; [%id baz]] ()`.\n\nNote that `[%simp ...]` is an alias for `[%simplify ...]`.\n\nNote the syntax `[%simplify_only ...]` and its alias `[%simp_only ...]`\nwhich are like `[%simp ...]` with `~strict:true`.", "documentation_md": "Full simplifier (the waterfall simplifier). Pass `?smt:None` to use the\nbest available SMT solver. The parameter `rules` is an optional list of\nIDs of rewrite rules. If given, only these rewrite rules will be used\nduring simplification. The parameter `~strict` when `true` and given in\nconjunction with `rules` further restricts the simplifier to only use\ndefinitional rules (function definitions, both recursive and\nnon-recursive) and rewrite rules which are explicitly present in the\n`rules` list. The parameter `~backchain_limit` controls the recursive\ndepth of back-chaining on hypotheses that is allowed during the relieving\nof rewrite rule guards (hypotheses).\n\nNote the syntax `[%simplify foo, bar, baz]` which expands to `simplify\n~rules:[[%id foo]; [%id bar]; [%id baz]] ()`.\n\nNote that `[%simp ...]` is an alias for `[%simplify ...]`.\n\nNote the syntax `[%simplify_only ...]` and its alias `[%simp_only ...]`\nwhich are like `[%simp ...]` with `~strict:true`."}, {"name": "induct", "tac_id": "fn.tac.induct", "signature": "?smt:string -> ?on_fun:identifier -> ?on_vars:string list -> ?otf:bool -> ?max_induct:int -> ?do_not:string list -> unit -> t", "documentation": "Induction using the waterfall. Use like this:\n[induct ~smt:\"z3\" ~on_vars:[\"x\"; \"y\"] ()] for structural induction, or\n[induct ~on_fun:[%id f] ()] for function induction with function [f]", "documentation_md": "Induction using the waterfall. Use like this:\n`induct ~smt:\"z3\" ~on_vars:[\"x\"; \"y\"] ()` for structural induction, or\n`induct ~on_fun:[%id f] ()` for function induction with function `f`"}, {"name": "use", "tac_id": "fn.tac.use", "signature": "bool term -> t", "documentation": "Use an existing theorem to add an additional hypothesis to the current\ngoal. For example [use (quote_term (add_is_commutative x y))] takes a goal\n[A ?- B] and returns a goal [(x+y)=(y+x), A ?- B].\n\nNote the notation [[%use foo x y z]] handles term quoting automatically.", "documentation_md": "Use an existing theorem to add an additional hypothesis to the current\ngoal. For example `use (quote_term (add_is_commutative x y))` takes a goal\n`A ?- B` and returns a goal `(x+y)=(y+x), A ?- B`.\n\nNote the notation `[%use foo x y z]` handles term quoting automatically."}, {"name": "enumerate", "tac_id": "fn.tac.enumerate", "signature": "string list -> t", "documentation": "A tactic that enumerates all values of finite-type variables.", "documentation_md": "A tactic that enumerates all values of finite-type variables."}, {"name": "par_solve", "tac_id": "fn.tac.parsolve", "signature": "(t term * goal) list -> proof list res", "documentation": "Primitive to solve subgoals in parallel", "documentation_md": "Primitive to solve subgoals in parallel"}]
