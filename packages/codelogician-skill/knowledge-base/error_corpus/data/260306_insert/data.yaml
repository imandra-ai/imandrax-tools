- name: polymorphic_closure_type_mismatch
  id: 019cc346-6158-7023-b5f5-6d2af0a7aefa
  created_at: '2026-03-06T13:11:35.512293+00:00'
  kind: TypeErr
  msg_str: |-
    Application failed: expected argument of type `file_section list`
    but got (r.partitions : data_partition list)
  tags: []
  repro_iml: |
    type data_partition = {
      partition_name : LString.t;
      is_visible : bool;
    }

    type file_section = {
      section_name : LString.t;
      is_visible : bool;
    }

    type report = {
      partitions : data_partition list;
      sections : file_section list;
    }

    let get_visible_sections (r : report) : file_section list =
      List.filter (fun s -> s.is_visible) r.sections

    let get_visible_partitions (r : report) : data_partition list =
      List.filter (fun p -> p.is_visible) r.partitions
  err_msg:
    msg: 'Application failed: expected argument of type `file_section list`

      but got (r.partitions : data_partition list)'
    locs:
    - file: <none>
      start:
        line: 20
        col: 3
      stop:
        line: 20
        col: 50
    backtrace: null
  is_po_err: false
  solution: |
    type data_partition = {
      partition_name : LString.t;
      is_visible : bool;
    }

    type file_section = {
      section_name : LString.t;
      is_visible : bool;
    }

    type report = {
      partitions : data_partition list;
      sections : file_section list;
    }

    let get_visible_sections (r : report) : file_section list =
      List.filter (fun (s : file_section) -> s.is_visible) r.sections

    let get_visible_partitions (r : report) : data_partition list =
      List.filter (fun (p : data_partition) -> p.is_visible) r.partitions
  explanation: |
    When List.filter, List.map, or other higher-order List functions are used multiple
    times in the same file with lambdas at different types, IML's type inference can fail
    to resolve the polymorphic closure type. The lambda parameter gets inferred as the
    wrong type from a previous usage of the same higher-order function.
  solution_description: |
    Add explicit type annotations to all lambda parameters in higher-order function calls.
    For example, change `List.filter (fun x -> x.is_active) items` to
    `List.filter (fun (x : item) -> x.is_active) items`.
