    <module_LChar>
    In IML, we mainly use `LChar` and `LString`, (logic-mode character and logic-modestring). To create a logic-mode string (LString.t), you can use the syntax sugar`{{l|hello|l}}`.

    ```iml repl
    > let y = {{l|hello|l}};;
    val y: LChar.t list
    ```
    </module_LChar>

