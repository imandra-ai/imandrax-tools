content:
  - >
    Prefer pattern matching over using auxiliary functions if possible because it makes recursive steps explicit and visible, and
    directly reflects data's inductive structure. In comparison, auxiliary functions like `List.nth`, `List.length` add a layer of
    abstraction that obscures the underlying recursive structure, making formal verification more complex.
  - >
    Nested recursive functions complicate the proof process. Try to extract the nested function into a top-level function if possible.
  - >
    Higher-order function: When passing lambdas (anonymous functions) to higher-order functions like `List.filter`, `List.map`,
    `List.fold_left`, etc., annotating the lambda parameters with their concrete types will help Imandra use reduce higher-order
    definitions to first-order form for easier reasoning.
  - >
    Record types' field name: Don't define record types with the same field names in the same name space (module) unless you are
    willing to disambiguate them with annotations.
