# $schema: https://json.schemastore.org/github-workflow.json
name: release-tools
on:
  push:
    tags:
      - "imandrax-tools==*"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      pkg-name: ${{ steps.validate.outputs.pkg-name }}
      version: ${{ steps.validate.outputs.version }}
      tag: ${{ steps.validate.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - name: Validate release
        id: validate
        shell: bash
        working-directory: packages/imandrax-tools
        run: |
          # Read the canonical version from pyproject.toml and build the expected tag
          version_data=$(uv version --output-format=json)
          version=$(echo "$version_data" | jq -r '.version')
          pkg_name=$(echo "$version_data" | jq -r '.package_name')
          tag="${pkg_name}==${version}"

          echo "version=$version" >> $GITHUB_OUTPUT
          echo "pkg-name=$pkg_name" >> $GITHUB_OUTPUT
          echo "tag=$tag" >> $GITHUB_OUTPUT

          # Tag push: ensure the pushed git tag matches pyproject.toml version
          # Manual dispatch: ensure the expected tag exists on HEAD
          if [ "${{ github.event_name }}" = "push" ]; then
            actual_tag="${GITHUB_REF#refs/tags/}"
            if [ "$actual_tag" != "$tag" ]; then
              echo "::error::Git tag '$actual_tag' does not match pyproject.toml version '$tag'"
              exit 1
            fi
          else
            if ! git tag --list "$tag" --points-at HEAD | grep -q .; then
              echo "::error::Tag '$tag' not found on HEAD. Push the tag before dispatching."
              exit 1
            fi
          fi

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact-suffix: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact-suffix: linux-aarch64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact-suffix: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7

      - name: Sync corpus
        run: make sync-corpus
        working-directory: packages/imandrax-tools

      - name: Build wheel (${{ matrix.artifact-suffix }})
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          working-directory: packages/imandrax-tools

      - name: Upload build
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ matrix.artifact-suffix }}
          path: packages/imandrax-tools/dist/

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      - name: Sync corpus
        run: make sync-corpus
        working-directory: packages/imandrax-tools

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: packages/imandrax-tools

      - name: Upload sdist
        uses: actions/upload-artifact@v5
        with:
          name: dist-sdist
          path: packages/imandrax-tools/dist/

  pre-release-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      - uses: actions/download-artifact@v6
        with:
          name: dist-linux-x86_64
          path: packages/imandrax-tools/dist/

      - name: Run pre-release tests
        run: make test-wheel
        working-directory: packages/imandrax-tools
        env:
          IMANDRAX_API_KEY: ${{ secrets.IMANDRA_UNIVERSE_API_KEY }}

  pypi-publish:
    needs: [build, build-sdist, pre-release-test]
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v6
        with:
          pattern: dist-*
          merge-multiple: true
          path: packages/imandrax-tools/dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/imandrax-tools/dist/
          print-hash: true

  github-release:
    needs: [validate, pypi-publish]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v6
        with:
          pattern: dist-*
          merge-multiple: true
          path: packages/imandrax-tools/dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: ${{ needs.validate.outputs.pkg-name }} ${{ needs.validate.outputs.version }}
          files: packages/imandrax-tools/dist/*
          generate_release_notes: true
