# $schema: https://json.schemastore.org/github-workflow.json
name: release-codegen
on:
  push:
    tags:
      - "imandrax-codegen==*"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      pkg-name: ${{ steps.validate.outputs.pkg-name }}
      version: ${{ steps.validate.outputs.version }}
      tag: ${{ steps.validate.outputs.tag }}
      changelog: ${{ steps.validate.outputs.changelog }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - name: Validate release
        id: validate
        shell: bash
        working-directory: packages/imandrax-codegen
        run: |
          # Read the canonical version from pyproject.toml and build the expected tag
          version_data=$(uv version --output-format=json)
          version=$(echo "$version_data" | jq -r '.version')
          pkg_name=$(echo "$version_data" | jq -r '.package_name')
          tag="${pkg_name}==${version}"

          echo "version=$version" >> $GITHUB_OUTPUT
          echo "pkg-name=$pkg_name" >> $GITHUB_OUTPUT
          echo "tag=$tag" >> $GITHUB_OUTPUT

          # Find the previous release tag for THIS package, for the "Full
          # Changelog" compare link appended to the release body. Tags for
          # different packages are interleaved in this monorepo, so we must
          # match the same package prefix rather than rely on whatever tag was
          # pushed last (which would span the wrong package and date range).
          prev_tag=$(
            { git tag --list "${pkg_name}==*"; echo "$tag"; } \
              | sort -V -u \
              | grep -B1 -x "$tag" \
              | head -n1
          )
          [ "$prev_tag" = "$tag" ] && prev_tag=""

          # Tag push: ensure the pushed git tag matches pyproject.toml version
          # Manual dispatch: ensure the expected tag exists on HEAD
          if [ "${{ github.event_name }}" = "push" ]; then
            actual_tag="${GITHUB_REF#refs/tags/}"
            if [ "$actual_tag" != "$tag" ]; then
              echo "::error::Git tag '$actual_tag' does not match pyproject.toml version '$tag'"
              exit 1
            fi
          else
            if ! git tag --list "$tag" --points-at HEAD | grep -q .; then
              echo "::error::Tag '$tag' not found on HEAD. Push the tag before dispatching."
              exit 1
            fi
          fi

          # Build the release body from this version's CHANGELOG.md section,
          # appending a same-package "Full Changelog" compare link.
          compare_url=""
          if [ -n "$prev_tag" ]; then
            compare_url="${{ github.server_url }}/${{ github.repository }}/compare/${prev_tag}...${tag}"
          fi
          body=$("$GITHUB_WORKSPACE/scripts/release-notes.sh" \
            --changelog CHANGELOG.md \
            --version "$version" \
            --compare-url "$compare_url")
          {
            echo "changelog<<__CL_EOF__"
            printf '%s\n' "$body"
            echo "__CL_EOF__"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: validate
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - platform-tag: manylinux_2_17_x86_64
            binary-name: art_parse-linux-x86_64
            artifact-suffix: linux-x86_64
          - platform-tag: manylinux_2_17_aarch64
            binary-name: art_parse-linux-aarch64
            artifact-suffix: linux-aarch64
          - platform-tag: macosx_11_0_arm64
            binary-name: art_parse-darwin-arm64
            artifact-suffix: macos

    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      # Download pre-built binary for this platform
      - name: Download codegen binary (${{ matrix.artifact-suffix }})
        run: |
          gh release download codegen-binaries \
            --pattern "${{ matrix.binary-name }}" \
            --output python/imandrax_codegen/art_parse.exe \
            --clobber
          chmod +x python/imandrax_codegen/art_parse.exe
        working-directory: packages/imandrax-codegen
        env:
          GH_TOKEN: ${{ github.token }}

      # Build platform-specific wheel
      - name: Build wheel for ${{ matrix.artifact-suffix }}
        run: |
          uv build --wheel
          # Retag wheel to platform-specific (modifies internal metadata)
          uv tool run wheel tags --platform-tag ${{ matrix.platform-tag }} --remove dist/*.whl
        working-directory: packages/imandrax-codegen

      - name: Upload build
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ matrix.artifact-suffix }}
          path: packages/imandrax-codegen/dist/

  pre-release-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7

      # Download all platform artifacts
      - uses: actions/download-artifact@v6
        with:
          name: dist-linux-x86_64
          path: packages/imandrax-codegen/dist/

      - uses: actions/download-artifact@v6
        with:
          name: dist-linux-aarch64
          path: packages/imandrax-codegen/dist/

      - uses: actions/download-artifact@v6
        with:
          name: dist-macos
          path: packages/imandrax-codegen/dist/

      - name: Run pre-release tests for Linux x86_64
        run: make pre-release-test-linux-x86_64
        working-directory: packages/imandrax-codegen
        env:
          IMANDRAX_API_KEY: ${{ secrets.IMANDRA_UNIVERSE_API_KEY }}

  pypi-publish:
    needs: [build, pre-release-test]
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Download all platform artifacts
      - uses: actions/download-artifact@v6
        with:
          name: dist-linux-x86_64
          path: packages/imandrax-codegen/dist/

      - uses: actions/download-artifact@v6
        with:
          name: dist-linux-aarch64
          path: packages/imandrax-codegen/dist/

      - uses: actions/download-artifact@v6
        with:
          name: dist-macos
          path: packages/imandrax-codegen/dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/imandrax-codegen/dist/
          print-hash: true

  github-release:
    needs: [validate, pypi-publish]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Download all platform artifacts
      - uses: actions/download-artifact@v6
        with:
          name: dist-linux-x86_64
          path: packages/imandrax-codegen/dist/

      - uses: actions/download-artifact@v6
        with:
          name: dist-linux-aarch64
          path: packages/imandrax-codegen/dist/

      - uses: actions/download-artifact@v6
        with:
          name: dist-macos
          path: packages/imandrax-codegen/dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: ${{ needs.validate.outputs.pkg-name }} ${{ needs.validate.outputs.version }}
          files: packages/imandrax-codegen/dist/*
          body: ${{ needs.validate.outputs.changelog }}
